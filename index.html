    <script>
      // Fix for "Cannot set property fetch of #<Window> which has only a getter"
      // This happens when some libraries try to polyfill or override window.fetch
      (function() {
        var originalFetch = window.fetch;
        function patch(obj, prop) {
          try {
            var descriptor = Object.getOwnPropertyDescriptor(obj, prop);
            // If it's already writable or has a setter, we might not need to do anything
            // but to be safe and prevent the "only a getter" error, we redefine it if configurable
            if (!descriptor || descriptor.configurable) {
              Object.defineProperty(obj, prop, {
                get: function() { return originalFetch; },
                set: function(v) { 
                  console.warn('Intercepted attempt to override ' + prop + '. Ignoring to prevent crash.');
                },
                configurable: true,
                enumerable: true
              });
              return true;
            }
          } catch (e) {
            console.warn('Could not patch ' + prop + ' on', obj, e);
          }
          return false;
        }

        // Try window first, then Window.prototype
        if (!patch(window, 'fetch')) {
          patch(Window.prototype, 'fetch');
        }
        
        // Safety: ensure fetch is globally available
        if (typeof fetch === 'undefined' && originalFetch) {
          window.fetch = originalFetch;
        }
      })();
